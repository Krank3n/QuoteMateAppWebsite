<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>QuoteMate</title>
    <style id="expo-reset">
      html,
      body {
        height: 100%;
        margin: 0;
        background: #0f172a;
      }
      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
    <style id="loading-styles">
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #app-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader img {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        margin-bottom: 24px;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(249, 115, 22, 0.2);
        border-top-color: #f97316;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #app-loader p {
        margin-top: 16px;
        color: #94a3b8;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        letter-spacing: 0.02em;
      }
    </style>
    <link rel="icon" href="/app/favicon.ico" />
  </head>

  <body>
    <div id="app-loader">
      <img src="/app/assets/assets/logo-scaled.6adf0fa856d0ee5788c7c07dee6abd47.png" alt="QuoteMate" />
      <div class="spinner"></div>
      <p>Loading QuoteMate...</p>
    </div>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <div id="root"></div>
    <script src="/app/_expo/static/js/web/index-7f3bfac7c7c5a655362a169513ffa6c4.js" defer></script>
    <script>
      // Hide loader once app renders
      var checkReady = setInterval(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          clearInterval(checkReady);
          var loader = document.getElementById('app-loader');
          if (loader) {
            loader.classList.add('fade-out');
            setTimeout(function() { loader.remove(); }, 400);
          }
        }
      }, 100);
      // Fallback: hide after 10s regardless
      setTimeout(function() {
        var loader = document.getElementById('app-loader');
        if (loader) {
          loader.classList.add('fade-out');
          setTimeout(function() { loader.remove(); }, 400);
        }
      }, 10000);
    </script>
  </body>
</html>
