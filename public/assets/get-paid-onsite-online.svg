<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <!-- Left side: On-Site -->
  <g transform="translate(60, 40)">
    <!-- Label -->
    <text x="130" y="16" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="3">ON-SITE</text>

    <!-- Phone -->
    <rect x="55" y="40" width="150" height="300" rx="24" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <rect x="67" y="64" width="126" height="252" rx="12" fill="#0F172A"/>
    <!-- Notch -->
    <rect x="105" y="46" width="50" height="5" rx="2.5" fill="#334155"/>

    <!-- Contactless waves -->
    <g transform="translate(130, 140)">
      <path d="M-10 14a18 18 0 0 1 0-28" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M-18 20a28 28 0 0 1 0-40" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>
      <path d="M-26 26a38 38 0 0 1 0-52" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.3"/>
      <!-- Card -->
      <rect x="0" y="-10" width="40" height="26" rx="5" fill="#f97316"/>
      <rect x="6" y="-4" width="10" height="8" rx="2" fill="#ea580c"/>
      <line x1="6" y1="10" x2="26" y2="10" stroke="#ea580c" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Amount -->
    <text x="130" y="220" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="24" font-weight="700" text-anchor="middle">$2,450</text>
    <text x="130" y="244" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Tap card to pay</text>

    <!-- Square badge -->
    <rect x="68" y="266" width="124" height="32" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="130" y="287" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Powered by Square</text>
  </g>

  <!-- Center connector -->
  <g transform="translate(400, 60)">
    <line x1="0" y1="20" x2="0" y2="280" stroke="#334155" stroke-width="1" stroke-dasharray="4,8"/>
    <rect x="-22" y="132" width="44" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="0" y="155" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">OR</text>
  </g>

  <!-- Right side: Online -->
  <g transform="translate(460, 40)">
    <!-- Label -->
    <text x="140" y="16" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="3">ONLINE</text>

    <!-- Invoice -->
    <rect x="30" y="40" width="220" height="300" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>

    <!-- Header bar -->
    <rect x="30" y="40" width="220" height="48" rx="16" fill="#1E293B"/>
    <rect x="30" y="72" width="220" height="16" fill="#1E293B"/>
    <rect x="48" y="52" width="48" height="8" rx="4" fill="#f97316"/>
    <rect x="48" y="66" width="90" height="6" rx="3" fill="#334155"/>

    <!-- Line items -->
    <line x1="48" y1="92" x2="232" y2="92" stroke="#334155" stroke-width="0.5"/>
    <rect x="48" y="104" width="110" height="5" rx="2.5" fill="#475569"/>
    <rect x="200" y="104" width="32" height="5" rx="2.5" fill="#475569"/>
    <rect x="48" y="122" width="85" height="5" rx="2.5" fill="#475569"/>
    <rect x="200" y="122" width="32" height="5" rx="2.5" fill="#475569"/>
    <rect x="48" y="140" width="95" height="5" rx="2.5" fill="#475569"/>
    <rect x="200" y="140" width="32" height="5" rx="2.5" fill="#475569"/>
    <line x1="48" y1="160" x2="232" y2="160" stroke="#334155" stroke-width="0.5"/>

    <!-- Total -->
    <text x="48" y="184" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Total (inc. GST)</text>
    <text x="232" y="184" fill="#F8FAFC" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="end">$2,450.00</text>

    <!-- Pay Now button -->
    <rect x="48" y="206" width="184" height="48" rx="12" fill="#f97316"/>
    <text x="140" y="236" fill="#ffffff" font-family="system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Pay Now</text>

    <!-- Payment methods -->
    <g transform="translate(48, 272)">
      <rect x="0" y="0" width="42" height="24" rx="6" fill="#0F172A" stroke="#334155" stroke-width="0.5"/>
      <text x="21" y="16" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">VISA</text>
      <rect x="48" y="0" width="42" height="24" rx="6" fill="#0F172A" stroke="#334155" stroke-width="0.5"/>
      <text x="69" y="16" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">PayID</text>
      <rect x="96" y="0" width="42" height="24" rx="6" fill="#0F172A" stroke="#334155" stroke-width="0.5"/>
      <text x="117" y="16" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">BPAY</text>
      <rect x="144" y="0" width="40" height="24" rx="6" fill="#0F172A" stroke="#334155" stroke-width="0.5"/>
      <text x="164" y="16" fill="#CBD5E1" font-family="system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">Bank</text>
    </g>
  </g>
</svg>
